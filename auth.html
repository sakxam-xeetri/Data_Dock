<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataDock — Login</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    /* =====================================================
       DATADOCK — MARIO TERMINAL OVERRIDE (auth)
       ===================================================== */

    /* ── Auth card ── */
    .auth-card {
      border: 2px solid rgba(229,37,33,.35) !important;
      border-top: 4px solid #e52521 !important;
      border-radius: 0 !important;
      box-shadow: 0 0 0 1px #9b1a17, 0 0 50px rgba(229,37,33,.1), 4px 4px 0 #9b1a17 !important;
    }

    /* ── Logo ── */
    .auth-logo {
      font-family: 'Press Start 2P', monospace !important;
      font-size: .8rem !important;
      color: #f7b731 !important;
      text-shadow: 2px 2px 0 #9b1a17 !important;
      gap: 12px !important;
    }
    .auth-logo i { color: #e52521 !important; filter: drop-shadow(0 0 6px rgba(229,37,33,.5)) !important; }
    .auth-subtitle { font-family: 'Press Start 2P', monospace !important; font-size: .43rem !important; color: #9a5060 !important; }

    /* ── Tabs ── */
    .auth-tabs { border-bottom-color: rgba(229,37,33,.2) !important; }
    .auth-tab {
      font-family: 'Press Start 2P', monospace !important;
      font-size: .46rem !important;
      border-radius: 0 !important;
      letter-spacing: .5px !important;
    }
    .auth-tab.active { color: #f7b731 !important; border-bottom-color: #e52521 !important; }

    /* ── Form labels ── */
    .auth-form .form-group label { font-family: 'Press Start 2P', monospace !important; font-size: .44rem !important; color: #f8d8a0 !important; letter-spacing: .4px !important; }

    /* ── Buttons ── */
    .btn-primary.btn-block {
      font-family: 'Press Start 2P', monospace !important;
      font-size: .52rem !important;
      background: #e52521 !important;
      color: #fff !important;
      border: 2px solid #ff6b65 !important;
      border-radius: 0 !important;
      box-shadow: 0 4px 0 #9b1a17 !important;
      position: relative !important;
      top: 0 !important;
      letter-spacing: .5px !important;
      transition: top .08s, box-shadow .08s !important;
    }
    .btn-primary.btn-block:hover { box-shadow: 0 4px 0 #9b1a17, 0 0 18px rgba(229,37,33,.35) !important; }
    .btn-primary.btn-block:active { top: 4px !important; box-shadow: 0 0 0 #9b1a17 !important; }
    .btn-google {
      font-family: 'Press Start 2P', monospace !important;
      font-size: .46rem !important;
      border-radius: 0 !important;
      border: 2px solid rgba(255,255,255,.2) !important;
      box-shadow: 0 4px 0 rgba(0,0,0,.5) !important;
      position: relative !important;
      top: 0 !important;
      letter-spacing: .5px !important;
      transition: top .08s, box-shadow .08s !important;
    }
    .btn-google:active { top: 4px !important; box-shadow: 0 0 0 rgba(0,0,0,.5) !important; }

    /* ── Divider ── */
    .auth-divider span { font-family: 'Press Start 2P', monospace !important; font-size: .42rem !important; color: #9a5060 !important; }
    .auth-footer { font-family: 'Press Start 2P', monospace !important; font-size: .38rem !important; color: #6a3a40 !important; }

    /* ── Loading ── */
    .loading-text { font-family: 'Press Start 2P', monospace !important; color: #f7b731 !important; font-size: .52rem !important; }
    .spinner { border-top-color: #e52521 !important; box-shadow: 0 0 8px rgba(229,37,33,.3) !important; }
  </style>
</head>
<body class="auth-page">
  <!-- Matrix Background -->
  <canvas id="matrix-bg"></canvas>
  <div class="grid-overlay"></div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <i class="fas fa-database"></i>
        <span>DataDock</span>
      </div>
      <p class="auth-subtitle">&gt;_ Your personal data management hub</p>

      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form active">
        <div class="form-group">
          <label for="login-email">Email</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
          </div>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" class="auth-form">
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <div class="input-icon">
            <i class="fas fa-user"></i>
            <input type="text" id="signup-name" placeholder="John Doe" required />
          </div>
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email" />
          </div>
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password" />
          </div>
        </div>
        <div class="form-group">
          <label for="signup-confirm">Confirm Password</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input type="password" id="signup-confirm" placeholder="••••••••" required minlength="6" autocomplete="new-password" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <!-- Divider -->
      <div class="auth-divider">
        <span>or</span>
      </div>

      <!-- Google Login -->
      <button id="google-login-btn" class="btn btn-google btn-block">
        <i class="fab fa-google"></i> Continue with Google
      </button>

      <p class="auth-footer">
        By continuing, you agree to DataDock's Terms of Service.
      </p>
      <p class="auth-footer" style="margin-top:8px;">
        <a href="index.html">Back to landing page</a>
      </p>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="loading-text">AUTHENTICATING...</div>
    <div class="spinner"></div>
    <div class="neon-progress"><div class="neon-progress-bar"></div></div>
  </div>

  <script type="module" src="assets/js/firebase-config.js"></script>
  <script type="module" src="assets/js/auth.js"></script>

  <script>
    // Matrix rain animation
    (function() {
      const canvas = document.getElementById('matrix-bg');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let w, h, cols, drops;
      const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        cols = Math.floor(w / 18);
        drops = Array(cols).fill(1);
      }

      function draw() {
        ctx.fillStyle = 'rgba(10, 10, 15, 0.06)';
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#e5252118';
        ctx.font = '14px monospace';
        for (let i = 0; i < cols; i++) {
          const char = chars[Math.floor(Math.random() * chars.length)];
          ctx.fillText(char, i * 18, drops[i] * 18);
          if (drops[i] * 18 > h && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
        requestAnimationFrame(draw);
      }

      resize();
      window.addEventListener('resize', resize);
      draw();
    })();
  </script>
</body>
</html>
